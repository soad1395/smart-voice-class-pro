---
title: "منصة أولياء الأمور"
---

<div id="app"></div>

<script>
document.body.innerHTML = `

<style>
body{margin:0;font-family:Tajawal;background:#f5f6fa;display:flex}
.sidebar{width:220px;background:#1e293b;color:#fff;height:100vh;padding:20px}
.sidebar div{padding:12px;margin:5px 0;cursor:pointer;border-radius:10px}
.sidebar div:hover{background:#334155}
.main{flex:1;padding:20px}
.card{background:#fff;padding:15px;border-radius:15px;margin-bottom:10px}
button{background:#7c3aed;color:#fff;border:none;padding:8px;margin:5px;border-radius:8px}
.del{background:red}
input,textarea,select{width:100%;padding:8px;margin-top:5px}
audio{width:100%}
</style>

<div class="sidebar">
<h3>📱 المنصة</h3>
<div onclick="go('home')">الرئيسية</div>
<div onclick="go('add')">إضافة رسالة</div>
<div onclick="go('messages')">الرسائل</div>
</div>

<div class="main">

<div id="home" class="page">
<h2>الرئيسية</h2>

<input id="className" placeholder="اسم الفصل">
<button onclick="addClass()">إضافة</button>

<textarea id="studentsText" placeholder="أسماء الطالبات"></textarea>
<button onclick="addStudents()">إضافة طالبات</button>

<div id="studentsList"></div>
</div>

<div id="add" class="page" style="display:none">
<h2>إضافة رسالة</h2>

<select id="studentSelect"></select>

<select id="sender">
<option>معلمة</option>
<option>ولي أمر</option>
</select>

<textarea id="msg"></textarea>
<button onclick="saveMsg()">إرسال</button>

<hr>

<button onclick="startRec()">🎤 تسجيل</button>
<button onclick="stopRec()">إيقاف</button>
<audio id="audioPlayer" controls></audio>
<button onclick="saveAudio()">حفظ الصوت</button>

</div>

<div id="messages" class="page" style="display:none">
<h2>الرسائل</h2>

<div id="msgList"></div>
<div id="audioList"></div>

</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("platform")) || {
students:[],
messages:[],
audios:[]
};

function save(){
localStorage.setItem("platform", JSON.stringify(data));
render();
}

function go(p){
document.querySelectorAll(".page").forEach(x=>x.style.display="none");
document.getElementById(p).style.display="block";
}

function addStudents(){
studentsText.value.split("\\n").forEach(s=>{
if(s.trim()) data.students.push(s.trim());
});
studentsText.value="";
save();
}

function addClass(){ save(); }

function saveMsg(){
data.messages.push({
student:studentSelect.value,
text:msg.value,
sender:sender.value
});
msg.value="";
save();
}

function deleteMsg(i){
data.messages.splice(i,1);
save();
}

/* الصوت */
let rec,chunks=[];

async function startRec(){
let stream = await navigator.mediaDevices.getUserMedia({audio:true});
rec = new MediaRecorder(stream);
chunks=[];
rec.ondataavailable=e=>chunks.push(e.data);
rec.start();
}

function stopRec(){
rec.stop();
rec.onstop=()=>{
let blob=new Blob(chunks);
audioPlayer.src=URL.createObjectURL(blob);
audioPlayer.blob=blob;
};
}

function saveAudio(){
let reader=new FileReader();
reader.readAsDataURL(audioPlayer.blob);
reader.onload=()=>{
data.audios.push(reader.result);
save();
};
}

function deleteAudio(i){
data.audios.splice(i,1);
save();
}

function render(){

studentsList.innerHTML=data.students.map(s=>`<div>${s}</div>`).join("");

studentSelect.innerHTML=data.students.map(s=>`<option>${s}</option>`);

msgList.innerHTML=data.messages.map((m,i)=>`
<div class="card">
${m.student} - ${m.sender}<br>
${m.text}
<button class="del" onclick="deleteMsg(${i})">حذف</button>
</div>`).join("");

audioList.innerHTML=data.audios.map((a,i)=>`
<div class="card">
<audio src="${a}" controls></audio>
<button class="del" onclick="deleteAudio(${i})">حذف</button>
</div>`).join("");

}

render();

</script>

`;

</script>
